<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>강의 데크</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" />
<style>
/* slides.css — 다크 'Obsidian' 테마. deck.html + editor.html 공유.
   obsidianmrchoi.netlify.app 의 레이아웃·색·폰트를 1280×720 고정 좌표계로 이식.
   3색 원칙: ① 배경(차콜) ② 글자(흰색, 투명도로 위계) ③ 강조(블루).
   + 시그니처 청록(--accent2)은 라벨선·불릿에만 점으로 사용. */
  :root{
    /* ── 칠하는 색 ─────────────────────────── */
    --bg:#1f2228;            /* ① 배경(차콜) */
    --bg-deep:#16181c;       /*    더 깊은 배경(다크 레이아웃) */
    --fg:#ffffff;            /* ② 글자(흰색) */
    --accent:#3b82f6;        /* ③ 강조(블루) — 기관 브랜드 색으로 교체 가능 */
    --accent2:#22d3ee;       /*    시그니처 청록(라벨선·불릿). 1색만 쓰려면 var(--accent) 로 */
    /* ↓ 흰색 투명도 단계(새 색 아님 — 위계 표현용) */
    --t72:rgba(255,255,255,.72);
    --t50:rgba(255,255,255,.5);
    --t30:rgba(255,255,255,.3);
    --t12:rgba(255,255,255,.12);
    --t08:rgba(255,255,255,.08);
    --t05:rgba(255,255,255,.05);
    --muted:var(--t50); --line:var(--t12); --code-bg:var(--t08);
    --accent-2:var(--accent2);  /* 하위호환 */
    --stage-bg:#0e1014;      /* 무대 바깥 레터박스 */
    --font-sans:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,'D2Coding',monospace;
    --slide-w:1280px;
    --slide-h:720px;
  }

  .slide{
    position:absolute;inset:0;
    background:var(--bg);
    color:var(--fg);
    padding:88px 96px;
    display:none;
    flex-direction:column;
    justify-content:center;        /* obsidian: 콘텐츠 세로 중앙 */
    overflow:hidden;
    border-radius:6px;
  }
  .slide.is-active{display:flex}

  /* ── 시그니처 배경: 그리드 + 메시 글로우(은은하게, 정적) ── */
  .slide::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(var(--t05) 1px,transparent 1px),linear-gradient(90deg,var(--t05) 1px,transparent 1px);
    background-size:56px 56px;
    -webkit-mask-image:radial-gradient(ellipse 85% 65% at 50% 0%,#000 30%,transparent 78%);
    mask-image:radial-gradient(ellipse 85% 65% at 50% 0%,#000 30%,transparent 78%)}
  .slide::after{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(circle at 20% 26%,rgba(59,130,246,.16),transparent 42%),
               radial-gradient(circle at 80% 58%,rgba(167,139,250,.11),transparent 46%),
               radial-gradient(circle at 56% 92%,rgba(34,211,238,.10),transparent 46%)}

  .slide-body{position:relative;z-index:1;flex:1;min-height:0;display:flex;flex-direction:column;gap:18px;justify-content:center}
  .slide-body.center{justify-content:center}

  /* ── 타이포 ───────────────────────────────── */
  /* 큰 제목(표지·섹션) — 모노 */
  .slide h1{font-family:var(--font-mono);font-weight:700;font-size:88px;line-height:1.0;letter-spacing:.01em;color:#fff;word-break:keep-all;overflow-wrap:anywhere}
  /* 내용 제목 — 산세리프 굵게 */
  .slide h2{font-size:46px;line-height:1.14;letter-spacing:-.02em;font-weight:800;color:#fff;margin-bottom:4px}
  /* 작은 라벨 — 모노 */
  .slide h3{font-family:var(--font-mono);font-size:17px;font-weight:700;letter-spacing:.18em;color:var(--t50);text-transform:uppercase}
  .slide p{font-size:24px;line-height:1.6;color:var(--t72)}
  .slide strong{color:#fff;font-weight:700}
  .slide em{font-style:normal;color:var(--accent);font-weight:600}
  .slide a{color:var(--accent2);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--accent2) 45%,transparent)}
  .slide del{color:var(--t30)}

  /* kicker: 청록 글로우 선 + 모노 대문자 라벨  (마크다운: ^ 라벨) */
  .slide .kicker{display:flex;align-items:center;gap:13px;font-family:var(--font-mono);font-size:15px;letter-spacing:.26em;text-transform:uppercase;color:var(--t50);margin-bottom:6px}
  .slide .kicker::before{content:"";width:30px;height:1px;background:var(--accent2);box-shadow:0 0 9px var(--accent2);flex:none}

  /* 목록: — 청록 대시 */
  .slide ul{list-style:none;display:flex;flex-direction:column;gap:14px;padding:0}
  .slide ol{padding-left:1.2em;display:flex;flex-direction:column;gap:14px}
  .slide li{font-size:23px;line-height:1.5;color:var(--t72);display:flex;gap:14px}
  .slide ul>li::before{content:"—";font-family:var(--font-mono);color:var(--accent2);flex:none}
  .slide li strong,.slide li b{color:#fff;font-weight:600}
  .slide ol{list-style:decimal;color:var(--t72)}
  .slide ol>li{display:list-item}

  .slide code{font-family:var(--font-mono);font-size:.86em;background:var(--t08);padding:2px 7px;border-radius:5px;color:#cfe1ff}
  .slide pre{background:var(--bg-deep);border:1px solid var(--t08);padding:22px 26px;border-radius:10px;overflow:auto;font-size:18px;line-height:1.6;color:var(--t72)}
  .slide pre code{background:none;padding:0;font-size:18px;color:var(--t72)}
  .slide blockquote{border-left:3px solid var(--accent);padding:4px 0 4px 22px;color:#fff;font-size:25px;line-height:1.5}
  .slide blockquote cite,.slide blockquote .src{display:block;margin-top:12px;font-family:var(--font-mono);font-size:15px;letter-spacing:.04em;color:var(--t50);font-style:normal}
  .slide hr{border:none;border-top:1px solid var(--t12);margin:16px 0}
  .slide img{max-width:100%;max-height:100%;object-fit:contain;border-radius:10px}
  .slide figure{display:flex;flex-direction:column;gap:10px;align-items:center;min-height:0}
  .slide figcaption{font-family:var(--font-mono);font-size:14px;letter-spacing:.04em;color:var(--t50);text-align:center}
  .slide table{border-collapse:collapse;width:100%;font-size:20px;color:var(--t72)}
  .slide th,.slide td{border:1px solid var(--t12);padding:11px 15px;text-align:left;vertical-align:top}
  .slide th{background:var(--t05);font-family:var(--font-mono);font-size:16px;letter-spacing:.06em;font-weight:700;color:#fff}
  .slide td strong{color:#fff}

  /* 큰 숫자(통계) */
  .slide .stat{font-family:var(--font-mono);font-size:118px;font-weight:700;line-height:1;letter-spacing:-.01em;color:var(--accent)}

  /* 출처 표기 — 마크다운: @src 출처 텍스트 → 슬라이드 하단 작은 회색 모노 */
  .slide .source{margin-top:auto;padding-top:14px;font-family:var(--font-mono);font-size:13px;line-height:1.55;letter-spacing:.01em;color:var(--t30);max-width:90%}
  .slide .source::before{content:"출처  ";color:var(--accent2);opacity:.85}
  .slide .source + .source{margin-top:2px;padding-top:0}
  .slide .source + .source::before{content:"          "}

  /* 이미지 자리(점선 박스) — 마크다운: @img 설명 → 에디터에서 🖼 버튼으로 교체 */
  .slide .imgph{display:flex;align-items:center;justify-content:center;text-align:center;
    border:2px dashed var(--t30);border-radius:12px;background:var(--t03,rgba(255,255,255,.03));
    min-height:150px;padding:20px 24px;margin:4px 0;
    font-family:var(--font-mono);font-size:18px;letter-spacing:.02em;color:var(--t50)}

  /* ── 레이아웃 변형 ───────────────────────── */
  .slide.title{justify-content:center}
  .slide.title h1{font-size:104px}
  .slide.section h1{font-size:100px}
  .slide.section .kicker,.slide.title .kicker{font-size:16px}
  .slide.dark{background:var(--bg-deep)}
  .slide.center{text-align:center}
  .slide.center .kicker{justify-content:center}
  .slide.center ul{display:inline-block;text-align:left}

  /* 2단 컬럼 */
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:44px;flex:1;min-height:0}
  .cols>div{min-width:0;display:flex;flex-direction:column;gap:14px;justify-content:center}
  .cols.center>div{justify-content:center}

  /* ── 카드 그리드(::: cards) — 호버 인터랙션 ── */
  .slide .cardgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:8px}
  .slide .card{
    background:var(--t05);border:1px solid var(--t12);border-radius:14px;padding:26px 24px;
    display:flex;flex-direction:column;gap:8px;cursor:default;
    transition:transform .25s cubic-bezier(.2,.7,.2,1),border-color .25s ease,box-shadow .25s ease,background .25s ease;
  }
  .slide .card:hover{
    transform:translateY(-7px);
    border-color:var(--accent);
    background:var(--t08);
    box-shadow:0 16px 34px color-mix(in srgb,var(--accent) 24%,transparent);
  }
  .slide .card>*{margin:0}
  .slide .card h3{margin-bottom:4px}                 /* 라벨(### ) */
  .slide .card p{font-size:18px;color:var(--t72);line-height:1.45}
  .slide .card p:first-of-type{font-size:23px}        /* 첫 줄(제목)은 크게 */
  .slide .card strong{color:#fff;font-weight:700}
  .slide .card li{font-size:17px}

  /* ── 막대 차트(::: bars) ─────────────────── */
  .slide .bars{display:flex;flex-direction:column;gap:15px;margin-top:8px}
  .slide .bar-row{display:grid;grid-template-columns:minmax(110px,max-content) 1fr max-content;align-items:center;gap:18px}
  .slide .bar-lab{color:#fff;font-weight:600;font-size:21px}
  .slide .bar-track{height:18px;background:var(--t08);border-radius:99px;overflow:hidden}
  .slide .bar-fill{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .slide .bar-val{font-family:var(--font-mono);color:var(--t72);font-size:18px;min-width:46px;text-align:right}

  /* ── 흐름도(::: flow) ───────────────────── */
  .slide .flow{display:flex;flex-wrap:wrap;align-items:center;gap:12px 8px;margin-top:8px}
  .slide .flow-step{background:var(--t05);border:1px solid var(--t12);border-radius:11px;padding:14px 20px;font-size:21px;color:#fff;font-weight:600;line-height:1.25}
  .slide .flow-arrow{font-family:var(--font-mono);color:var(--accent2);font-size:24px;flex:none}

  /* 풀블리드 배경 이미지: <!-- bg:assets/x.jpg --> */
  .slide.has-bg{padding:0}
  .slide.has-bg::before,.slide.has-bg::after{display:none}
  .slide.has-bg .bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
  .slide.has-bg .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(10,12,16,.86),rgba(10,12,16,.32))}
  .slide.has-bg .slide-body{position:relative;z-index:1;justify-content:flex-end;padding:88px 96px}

  /* ── 슬라이드 푸터(번호·브랜드) — 모노 ───── */
  .chrome{position:absolute;left:0;right:0;bottom:0;height:48px;padding:0 96px;display:flex;align-items:center;justify-content:space-between;font-family:var(--font-mono);font-size:13px;letter-spacing:.1em;color:var(--t30);pointer-events:none;z-index:3}
  .chrome .brand{font-weight:500}
  .slide.title .chrome,.slide.cover .chrome{display:none}

  /* ════════════════════════════════════════════════════
     발표 전환 + 등장 스태거 — '데크(#scaler)·발표(#present-scaler)'에서만.
     에디터 미리보기·필름스트립·개요·인쇄는 영향 없음(즉시 표시).
  ════════════════════════════════════════════════════ */
  #scaler .slide,#present-scaler .slide{
    display:flex;opacity:0;visibility:hidden;pointer-events:none;
    transform:translateX(38px) scale(.992);
    transition:opacity .5s cubic-bezier(.2,.7,.2,1),
               transform .55s cubic-bezier(.2,.7,.2,1),
               visibility .5s;
  }
  #scaler .slide.is-active,#present-scaler .slide.is-active{
    opacity:1;visibility:visible;pointer-events:auto;transform:none;z-index:2;
  }
  #scaler .slide.prev,#present-scaler .slide.prev{transform:translateX(-38px) scale(.992)}

  /* 콘텐츠 블록 순차 등장 */
  #scaler .slide .slide-body>*,#present-scaler .slide .slide-body>*{
    opacity:0;transform:translateY(16px);
    transition:opacity .5s ease,transform .55s cubic-bezier(.2,.7,.2,1);
  }
  #scaler .slide.is-active .slide-body>*,#present-scaler .slide.is-active .slide-body>*{opacity:1;transform:none}
  #scaler .slide.is-active .slide-body>*:nth-child(1),#present-scaler .slide.is-active .slide-body>*:nth-child(1){transition-delay:.10s}
  #scaler .slide.is-active .slide-body>*:nth-child(2),#present-scaler .slide.is-active .slide-body>*:nth-child(2){transition-delay:.18s}
  #scaler .slide.is-active .slide-body>*:nth-child(3),#present-scaler .slide.is-active .slide-body>*:nth-child(3){transition-delay:.26s}
  #scaler .slide.is-active .slide-body>*:nth-child(4),#present-scaler .slide.is-active .slide-body>*:nth-child(4){transition-delay:.34s}
  #scaler .slide.is-active .slide-body>*:nth-child(5),#present-scaler .slide.is-active .slide-body>*:nth-child(5){transition-delay:.42s}
  #scaler .slide.is-active .slide-body>*:nth-child(6),#present-scaler .slide.is-active .slide-body>*:nth-child(6){transition-delay:.50s}
  #scaler .slide.is-active .slide-body>*:nth-child(7),#present-scaler .slide.is-active .slide-body>*:nth-child(7){transition-delay:.58s}
  #scaler .slide.is-active .slide-body>*:nth-child(n+8),#present-scaler .slide.is-active .slide-body>*:nth-child(n+8){transition-delay:.66s}

  /* 접근성: 모션 최소화 설정 시 전환/이동 끔(활성 슬라이드만 즉시 표시) */
  @media (prefers-reduced-motion:reduce){
    #scaler .slide,#present-scaler .slide,
    #scaler .slide .slide-body>*,#present-scaler .slide .slide-body>*{
      transition:none!important;transform:none!important;
    }
    #scaler .slide .slide-body>*,#present-scaler .slide .slide-body>*{opacity:1!important}
  }

</style>
<!--
  ┌─────────────────────────────────────────────────────────────┐
  │  HTML 강의 플러그인 · deck.html (엔진)                          │
  │  · 콘텐츠는 건드리지 않습니다. 슬라이드는 slides.md 에서 작성.   │
  │  · 서버로 열면 slides.md 를 실시간 fetch, 더블클릭(file://)이면  │
  │    아래 <script id="md-fallback"> 에 넣어둔 사본을 사용합니다.   │
  │  단축키: ← → 이동 · F 전체화면 · O 한눈에보기 · S 발표자노트     │
  │         P 인쇄(배포용 PDF) · . 검은화면 · Home/End 처음/끝       │
  └─────────────────────────────────────────────────────────────┘
-->
<style>
/* :root 테마는 slides.css 제공 */
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--stage-bg);
    font-family:var(--font-sans);
    color:var(--fg);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ── 무대: 슬라이드를 화면 중앙에 비율 유지하며 배치 ── */
  #stage{position:fixed;inset:0;overflow:hidden}
  #scaler{width:var(--slide-w);height:var(--slide-h);position:absolute;left:0;top:0;transform-origin:top left}

/* .slide 비주얼은 slides.css 제공 */

  /* ── 진행바(화면 하단 고정) ─────────────────── */
  #progress{position:fixed;left:0;bottom:0;height:3px;background:var(--accent);width:0;transition:width .25s ease;z-index:40}

  /* ── HUD(슬라이드 번호 우상단) ──────────────── */
  #counter{position:fixed;top:18px;right:22px;z-index:40;font-size:13px;color:#fff;background:rgba(0,0,0,.45);padding:4px 11px;border-radius:99px;font-variant-numeric:tabular-nums;backdrop-filter:blur(6px)}

  /* ── 마우스 따라오는 옅은 원(커서 글로우) ── */
  #cursorglow{position:fixed;left:0;top:0;width:170px;height:170px;margin:-85px 0 0 -85px;border-radius:50%;
    pointer-events:none;z-index:30;opacity:0;
    background:radial-gradient(circle, color-mix(in srgb,var(--accent) 32%, transparent) 0%, color-mix(in srgb,var(--accent) 11%, transparent) 42%, transparent 70%);
    transition:opacity .4s ease;will-change:transform}
  body.has-cursor #cursorglow{opacity:.5}
  body.overview #cursorglow,body.blackout #cursorglow{opacity:0}
  @media (hover:none){#cursorglow{display:none}}   /* 터치기기에서만 숨김(모션최소화 설정과 무관) */

  /* ── 도움말 / 힌트 ──────────────────────────── */
  #hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:40;font-size:12.5px;color:rgba(255,255,255,.75);background:rgba(0,0,0,.4);padding:6px 14px;border-radius:99px;backdrop-filter:blur(6px);transition:opacity .4s;white-space:nowrap}
  #hint.hide{opacity:0;pointer-events:none}
  kbd{font-family:var(--font-mono);background:rgba(255,255,255,.18);border-radius:4px;padding:1px 5px;font-size:11px}

  /* ── 한눈에 보기(Overview) ──────────────────── */
  body.overview #stage{display:none}
  #grid{display:none;position:fixed;inset:0;overflow:auto;background:#15171d;padding:34px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;align-content:start}
  body.overview #grid{display:grid}
  .thumb{position:relative;aspect-ratio:16/9;border-radius:8px;overflow:hidden;cursor:pointer;background:#000;border:2px solid transparent;transition:border-color .15s,transform .15s}
  .thumb:hover{transform:translateY(-3px)}
  .thumb.cur{border-color:var(--accent)}
  .thumb .mini{position:absolute;top:0;left:0;width:var(--slide-w);height:var(--slide-h);transform-origin:top left;pointer-events:none}
  .thumb .num{position:absolute;bottom:6px;right:8px;z-index:2;font-size:12px;color:#fff;background:rgba(0,0,0,.6);padding:1px 7px;border-radius:99px}

  /* ── 발표자 노트 패널 ───────────────────────── */
  #notes{display:none;position:fixed;right:0;bottom:0;width:380px;max-height:42vh;overflow:auto;background:#0c0d11;color:#e5e7eb;padding:18px 22px;font-size:15px;line-height:1.55;z-index:45;border-top-left-radius:12px;box-shadow:-8px -8px 30px rgba(0,0,0,.4)}
  body.notes #notes{display:block}
  #notes h4{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#8b93a7;margin-bottom:8px}
  #notes:empty::after{content:"이 슬라이드에는 발표자 노트가 없습니다.";color:#8b93a7}

  /* ── 검은 화면(주의 집중) ───────────────────── */
  body.blackout #stage,body.blackout #progress,body.blackout #counter,body.blackout #hint{visibility:hidden}
  body.blackout{background:#000}

  /* ── 로딩/에러 ──────────────────────────────── */
  #boot{position:fixed;inset:0;display:grid;place-items:center;color:#cbd5e1;font-size:15px;z-index:60}

<script>
/* ═══════════════════════════════════════════════════════════════
   engine.js — 공용 렌더링 엔진 (deck.html + editor.html 공유)
   미니 마크다운 파서 + 슬라이드 DOM 생성. 의존성 0.
   전역(window)과 window.Deck 네임스페이스 양쪽으로 노출.
═══════════════════════════════════════════════════════════════ */
(function(global){
"use strict";

const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function inline(t){
  const codes=[];
  t = t.replace(/`([^`]+)`/g,(_,c)=>{codes.push(c);return `␀${codes.length-1}␀`;});
  t = esc(t);
  t = t.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,
        (_,a,src,cap)=>`<img src="${src}" alt="${a}">${cap?`<figcaption>${cap}</figcaption>`:""}`);
  t = t.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  t = t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>');
  t = t.replace(/~~([^~]+)~~/g,'<del>$1</del>');
  t = t.replace(/\x00(\d+)\x00/g,(_,i)=>`<code>${esc(codes[i])}</code>`);
  return t;
}

function blocks(md){
  const lines = md.replace(/\r/g,"").split("\n");
  let html="", i=0;
  const isImgOnly = h => /^<figure>/.test(h);
  while(i<lines.length){
    let ln=lines[i];
    if(/^\s*$/.test(ln)){i++;continue;}
    if(/^```/.test(ln)){
      let buf=[];i++;
      while(i<lines.length && !/^```/.test(lines[i])){buf.push(lines[i]);i++;}
      i++; html+=`<pre><code>${esc(buf.join("\n"))}</code></pre>`;continue;
    }
    // 카드 그리드:  ::: cards … +++ … :::  (호버 효과가 붙는 박스)
    if(/^:::\s*cards\s*$/i.test(ln)){
      let buf=[];i++;
      while(i<lines.length && !/^:::\s*$/.test(lines[i])){buf.push(lines[i]);i++;}
      i++; // 닫는 ::: 건너뜀
      const cards=buf.join("\n").split(/^\+\+\+\s*$/m);
      html+=`<div class="cardgrid">`+cards.map(c=>`<div class="card">${blocks(c.trim())}</div>`).join("")+`</div>`;
      continue;
    }
    // 막대 차트:  ::: bars … "라벨 | 값" 줄들 … :::
    if(/^:::\s*bars\s*$/i.test(ln)){
      let buf=[];i++;
      while(i<lines.length && !/^:::\s*$/.test(lines[i])){buf.push(lines[i]);i++;}
      i++;
      const rows=buf.filter(l=>l.trim()).map(l=>{
        const p=l.split("|"); const lab=p[0].trim();
        const valtext=(p.slice(1).join("|")||"").trim();
        const num=parseFloat(((valtext.match(/-?[\d.]+/)||["0"])[0]))||0;
        return {lab,valtext,num};
      });
      const max=Math.max(1,...rows.map(r=>Math.abs(r.num)));
      html+=`<div class="bars">`+rows.map(r=>
        `<div class="bar-row"><span class="bar-lab">${inline(r.lab)}</span>`+
        `<span class="bar-track"><span class="bar-fill" style="width:${Math.round(Math.abs(r.num)/max*100)}%"></span></span>`+
        `<span class="bar-val">${inline(r.valtext)}</span></div>`).join("")+`</div>`;
      continue;
    }
    // 흐름도:  ::: flow … "A → B → C" (→ 또는 -> 로 구분) … :::
    if(/^:::\s*flow\s*$/i.test(ln)){
      let buf=[];i++;
      while(i<lines.length && !/^:::\s*$/.test(lines[i])){buf.push(lines[i]);i++;}
      i++;
      const steps=buf.join(" ").split(/\s*(?:→|->)\s*/).map(s=>s.trim()).filter(Boolean);
      html+=`<div class="flow">`+steps.map((s,k)=>
        `<span class="flow-step">${inline(s)}</span>`+
        (k<steps.length-1?`<span class="flow-arrow">→</span>`:"")).join("")+`</div>`;
      continue;
    }
    if(/^\s*\|.*\|\s*$/.test(ln) && /^\s*\|[-:\s|]+\|\s*$/.test(lines[i+1]||"")){
      const row=r=>r.trim().replace(/^\||\|$/g,"").split("|").map(c=>c.trim());
      const head=row(ln), rows=[];i+=2;
      while(i<lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){rows.push(row(lines[i]));i++;}
      html+="<table><thead><tr>"+head.map(c=>`<th>${inline(c)}</th>`).join("")+"</tr></thead><tbody>"+
        rows.map(r=>"<tr>"+r.map(c=>`<td>${inline(c)}</td>`).join("")+"</tr>").join("")+"</tbody></table>";
      continue;
    }
    if(/^>\s?/.test(ln)){
      let buf=[];
      while(i<lines.length && /^>\s?/.test(lines[i])){buf.push(lines[i].replace(/^>\s?/,""));i++;}
      let cite="";
      const last=buf[buf.length-1]||"";
      if(/^[—\-–]\s/.test(last)){cite=last.replace(/^[—\-–]\s/,"");buf.pop();}
      html+=`<blockquote>${inline(buf.join(" "))}${cite?`<cite>— ${inline(cite)}</cite>`:""}</blockquote>`;
      continue;
    }
    if(/^\s*[-*]\s+/.test(ln) || /^\s*\d+\.\s+/.test(ln)){
      const ordered=/^\s*\d+\.\s+/.test(ln);
      const tag=ordered?"ol":"ul";let items=[];
      const re=ordered?/^\s*\d+\.\s+/:/^\s*[-*]\s+/;
      while(i<lines.length && re.test(lines[i])){items.push(lines[i].replace(re,""));i++;}
      html+=`<${tag}>`+items.map(t=>`<li>${inline(t)}</li>`).join("")+`</${tag}>`;
      continue;
    }
    let ig=ln.match(/^@img\s+(.+)$/);
    if(ig){html+=`<div class="imgph">🖼&nbsp; ${inline(ig[1])}</div>`;i++;continue;}
    let sr=ln.match(/^@src\s+(.+)$/);
    if(sr){html+=`<div class="source">${inline(sr[1])}</div>`;i++;continue;}
    let kk=ln.match(/^\^\s+(.+)$/);
    if(kk){html+=`<div class="kicker">${inline(kk[1])}</div>`;i++;continue;}
    let st=ln.match(/^::\s+(.+)$/);
    if(st){html+=`<div class="stat">${inline(st[1])}</div>`;i++;continue;}
    let m=ln.match(/^(#{1,6})\s+(.*)$/);
    if(m){html+=`<h${m[1].length}>${inline(m[2])}</h${m[1].length}>`;i++;continue;}
    if(/^---+$/.test(ln)){i++;continue;}
    let im=ln.match(/^!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)\s*$/);
    if(im){html+=`<figure><img src="${im[2]}" alt="${im[1]}">${im[3]?`<figcaption>${im[3]}</figcaption>`:""}</figure>`;i++;continue;}
    let buf=[ln];i++;
    while(i<lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,6}\s|>\s?|\s*[-*]\s|\s*\d+\.\s|```|\s*\||::\s|\^\s|@img\s|@src\s)/.test(lines[i])){buf.push(lines[i]);i++;}
    const joined=buf.join("\n");
    const wrapped=inline(joined);
    html+= isImgOnly(wrapped) ? wrapped : `<p>${wrapped.replace(/\n/g,"<br>")}</p>`;
  }
  return html;
}

function parseSlide(raw){
  let lines=raw.split("\n");
  let classes=[], bg=null, accent=null;
  let di=lines.findIndex(l=>l.trim()!=="");
  if(di>=0){
    const m=lines[di].match(/^\s*<!--\s*(.*?)\s*-->\s*$/);
    if(m){
      m[1].split(/\s+/).forEach(tok=>{
        if(tok.includes(":")){
          const [k,...v]=tok.split(":");const val=v.join(":");
          if(k==="bg")bg=val;
          else if(k==="accent")accent=val;
          else if(k==="layout")classes.push(...val.split(","));
          else classes.push(`${k}-${val}`);
        }else if(tok) classes.push(tok);
      });
      lines.splice(di,1);
    }
  }
  let notes="";
  const ni=lines.findIndex(l=>l.trim()==="???");
  if(ni>=0){notes=lines.slice(ni+1).join("\n").trim();lines=lines.slice(0,ni);}
  let body=lines.join("\n").trim();
  let inner;
  const hasCards=/^:::\s*cards\s*$/im.test(body);   // 카드 블록의 +++ 는 컬럼 분할 대상 아님
  if(!hasCards && (body.includes("\n+++")||body.startsWith("+++"))){
    const parts=body.split(/^\+\+\+\s*$/m);
    inner=`<div class="cols${classes.includes('center')?' center':''}">`+
      parts.map(p=>`<div>${blocks(p.trim())}</div>`).join("")+`</div>`;
  }else{
    inner=blocks(body);
  }
  return {classes,bg,accent,notes,inner,raw};
}

/* '---' 단독 줄로 분리(코드블록 내부 보호). 원본 텍스트 청크 배열을 반환 */
function splitSlides(md){
  const out=[];let buf=[],fence=false;
  md.replace(/\r/g,"").split("\n").forEach(l=>{
    if(/^```/.test(l))fence=!fence;
    if(!fence && /^---+\s*$/.test(l)){out.push(buf.join("\n"));buf=[];}
    else buf.push(l);
  });
  out.push(buf.join("\n"));
  return out.filter(s=>s.trim()!=="");
}

/* 슬라이드 1장 → <section.slide> DOM. brand/total은 푸터 표기에 사용 */
function slideEl(s, idx, total, brand){
  const el=document.createElement("section");
  el.className="slide "+s.classes.join(" ");
  if(s.accent) el.style.setProperty("--accent",s.accent);
  if(s.bg){el.classList.add("has-bg");el.insertAdjacentHTML("beforeend",`<div class="bg" style="background-image:url('${s.bg}')"></div>`);}
  const bodyCls = s.classes.some(c=>["title","center","section"].includes(c))?"slide-body center":"slide-body";
  el.insertAdjacentHTML("beforeend",`<div class="${bodyCls}">${s.inner}</div>`);
  if(total){
    el.insertAdjacentHTML("beforeend",
      `<div class="chrome"><span class="brand">${brand||""}</span><span>${String(idx+1).padStart(2,"0")} / ${String(total).padStart(2,"0")}</span></div>`);
  }
  return el;
}

/* 문서 전체 파싱 → {slides, brand} */
function parse(md){
  const slides=splitSlides(md).map(parseSlide);
  const brand=(md.match(/^#\s+(.+)$/m)?.[1]||"").slice(0,40);
  return {slides, brand};
}

const API={esc,inline,blocks,parseSlide,splitSlides,slideEl,parse};
global.Deck=API;
// 하위호환: 전역 함수로도 노출(deck.html 기존 코드)
Object.assign(global, API);

})(window);

</script>
<script>
"use strict";
/* ═══════════════════════════════════════════════════════════════
   1) 미니 마크다운 파서 (의존성 0, 강의 슬라이드에 필요한 문법만)
   지원: # 제목, **굵게**, *강조*, `코드`, ~~취소~~, [링크](url),
        ![alt](src "캡션"), - / 1. 목록, > 인용(+ — 출처),
        | 표 |, ```코드블록```, --- (슬라이드 구분),
        +++ (2단 컬럼 분할), <!-- 디렉티브 -->, ??? (발표자 노트)
═══════════════════════════════════════════════════════════════ */
/* 파서(esc/inline/blocks/parseSlide/splitSlides)는 engine.js(window.Deck) 제공 */

/* ═══════════════════════════════════════════════════════════════
   2) 렌더링 & 내비게이션
═══════════════════════════════════════════════════════════════ */
const state={slides:[],cur:0,brand:""};
const $scaler=document.getElementById("scaler");
const $grid=document.getElementById("grid");
const $print=document.getElementById("print");
const $counter=document.getElementById("counter");
const $progress=document.getElementById("progress");
const $notes=document.getElementById("notes");

/* slideEl 은 engine.js 제공 */

function render(){
  $scaler.innerHTML="";
  state.slides.forEach((s,i)=>$scaler.appendChild(slideEl(s,i,state.slides.length,state.brand)));
  buildGrid();
  buildPrint();
  fit();
}

function buildGrid(){
  $grid.innerHTML="";
  state.slides.forEach((s,i)=>{
    const t=document.createElement("div");
    t.className="thumb";t.setAttribute("role","listitem");
    const mini=document.createElement("div");mini.className="mini";
    mini.appendChild(slideEl(s,i,state.slides.length,state.brand)).classList.add("is-active");
    t.appendChild(mini);
    t.insertAdjacentHTML("beforeend",`<span class="num">${i+1}</span>`);
    t.onclick=()=>{go(i);toggleOverview(false);};
    $grid.appendChild(t);
  });
  scaleThumbs();
}
function scaleThumbs(){
  document.querySelectorAll("#grid .thumb").forEach(t=>{
    const w=t.clientWidth, scale=w/1280;
    t.querySelector(".mini").style.transform=`scale(${scale})`;
  });
}

function buildPrint(){
  $print.innerHTML="";
  state.slides.forEach((s,i)=>{
    const page=document.createElement("div");page.className="p-slide";
    const sc=document.createElement("div");sc.className="scaler";
    const el=slideEl(s,i,state.slides.length,state.brand);el.classList.add("is-active");
    sc.appendChild(el);page.appendChild(sc);$print.appendChild(page);
    // A4 가로 인쇄 영역(297mm×209mm)에 1280×720 맞추기
    requestAnimationFrame(()=>{
      const pw=page.clientWidth||1122;const scale=pw/1280;
      sc.style.transform=`scale(${scale})`;
    });
  });
}

function fit(){
  const vw=innerWidth, vh=innerHeight;
  const scale=Math.min(vw/1280, vh/720);
  const left=(vw-1280*scale)/2, top=(vh-720*scale)/2;
  $scaler.style.transform=`scale(${scale})`;
  $scaler.style.left=`${left}px`;
  $scaler.style.top=`${top}px`;
}

function go(i){
  state.cur=Math.max(0,Math.min(state.slides.length-1,i));
  [...$scaler.children].forEach((el,idx)=>{
    el.classList.toggle("is-active",idx===state.cur);
    el.classList.toggle("prev",idx<state.cur);
  });
  const n=state.cur+1,T=state.slides.length;
  $counter.textContent=`${n} / ${T}`;
  $progress.style.width=`${(n/T)*100}%`;
  $notes.innerHTML = state.slides[state.cur].notes
      ? `<h4>발표자 노트</h4>${blocks(state.slides[state.cur].notes)}` : "";
  document.querySelectorAll("#grid .thumb").forEach((t,idx)=>t.classList.toggle("cur",idx===state.cur));
  if(location.hash!==`#s${n}`) history.replaceState(null,"",`#s${n}`);
  document.body.classList.remove("blackout");
}
const next=()=>go(state.cur+1), prev=()=>go(state.cur-1);

function toggleOverview(on){
  const v = on===undefined ? !document.body.classList.contains("overview") : on;
  document.body.classList.toggle("overview",v);
  if(v) scaleThumbs();
}
function toggleNotes(){document.body.classList.toggle("notes");}
function toggleFull(){ if(!document.fullscreenElement)document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.(); }

/* ═══════════════════════════════════════════════════════════════
   3) 입력(키보드 · 터치 · 해시)
═══════════════════════════════════════════════════════════════ */
addEventListener("keydown",e=>{
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  const k=e.key, c=e.code;   // 글자 단축키는 e.code(물리 키)로 — 한/영 상태 무관
  if(k==="ArrowRight"||k==="PageDown"||k===" "||c==="Space") next();
  else if(k==="ArrowLeft"||k==="PageUp") prev();
  else if(k==="Home") go(0);
  else if(k==="End") go(state.slides.length-1);
  else if(c==="KeyF") toggleFull();
  else if(c==="KeyO") toggleOverview();
  else if(c==="KeyS") toggleNotes();
  else if(c==="KeyP") print();
  else if(c==="Period"||k===".") document.body.classList.toggle("blackout");
  else if(c==="Slash"||k==="?"||k==="/") document.getElementById("hint").classList.toggle("hide");
  else if(k==="Escape") toggleOverview(false);
  else return;
  e.preventDefault();
});
let tx=0;
addEventListener("touchstart",e=>tx=e.touches[0].clientX,{passive:true});
addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)dx<0?next():prev();});
// 마우스/포인터로 넘기기 — 좌클릭=다음, 우클릭=이전 (슬라이드 링크는 그대로, 개요 모드 제외)
(function(){var st=document.getElementById("stage");if(!st)return;
  st.addEventListener("click",function(e){if(document.body.classList.contains("overview"))return;if(e.target.closest("a"))return;next();});
  st.addEventListener("contextmenu",function(e){if(document.body.classList.contains("overview"))return;e.preventDefault();prev();});
})();

// 마우스 따라오는 옅은 원 — GSAP 없이 lerp 로 부드럽게(쫀득) 따라오기. 마우스 기기에서만.
(function(){
  if(!matchMedia("(hover:hover) and (pointer:fine)").matches) return;
  const glow=document.getElementById("cursorglow"); if(!glow) return;
  let mx=innerWidth/2, my=innerHeight/2, gx=mx, gy=my, raf=null;
  addEventListener("pointermove",e=>{
    mx=e.clientX; my=e.clientY;
    document.body.classList.add("has-cursor");
    if(!raf) raf=requestAnimationFrame(loop);
  },{passive:true});
  function loop(){
    gx+=(mx-gx)*0.16; gy+=(my-gy)*0.16;
    glow.style.transform=`translate3d(${gx}px,${gy}px,0)`;
    if(Math.abs(mx-gx)>0.4||Math.abs(my-gy)>0.4){ raf=requestAnimationFrame(loop); }
    else{ glow.style.transform=`translate3d(${mx}px,${my}px,0)`; raf=null; }
  }
})();
addEventListener("resize",()=>{fit();scaleThumbs();});
addEventListener("hashchange",()=>{const m=location.hash.match(/^#s(\d+)$/);if(m)go(+m[1]-1);});

// 힌트는 기본 숨김 — '?' 키로만 표시(첫 화면을 깔끔하게)

/* ═══════════════════════════════════════════════════════════════
   4) 부팅: slides.md fetch → 실패 시 인라인 사본
═══════════════════════════════════════════════════════════════ */
function boot(md,source){
  const slides=splitSlides(md).map(parseSlide);
  if(!slides.length){fail("슬라이드가 비어 있습니다. slides.md 를 확인하세요.");return;}
  // 첫 슬라이드 h1 을 브랜드/푸터 기본값으로
  state.brand = (md.match(/^#\s+(.+)$/m)?.[1]||"").slice(0,40);
  state.slides=slides;
  render();
  const m=location.hash.match(/^#s(\d+)$/);
  go(m?+m[1]-1:0);
  document.getElementById("boot").style.display="none";
  console.log(`[deck] ${slides.length} slides · source=${source}`);
}
function fail(msg){
  document.getElementById("boot").innerHTML=
    `<div class="err"><b>데크를 불러오지 못했습니다.</b><br><br>${msg}<br><br>
     · 가장 쉬운 방법: 이 폴더에서 터미널에 <code style="color:#fbbf24">python3 -m http.server</code> 실행 후
     <code style="color:#fbbf24">localhost:8000/deck.html</code> 접속<br>
     · 또는 slides.md 내용을 deck.html 의 <code>id="md-fallback"</code> 블록에 넣어 더블클릭으로 여세요.</div>`;
  document.getElementById("boot").style.display="grid";
}
(function start(){
  const fbRaw=document.getElementById("md-fallback").textContent;
  // 내장 표시 주석(FALLBACK_START/END)만 제거 — 진짜 <!-- title --> 등 디렉티브는 보존
  const fb=fbRaw.replace(/<!--\s*FALLBACK_(?:START|END)\s*-->/g,"").trim();
  const hasFallback = fb.replace(/<!--[\s\S]*?-->/g,"").trim().length>0;
  fetch("slides.md",{cache:"no-store"})
    .then(r=>{if(!r.ok)throw 0;return r.text();})
    .then(md=>boot(md,"slides.md"))
    .catch(()=>{
      if(hasFallback) boot(fb,"inline-fallback");
      else fail("file:// 로 직접 열면 slides.md 를 읽을 수 없습니다(브라우저 보안 정책).");
    });
})();
</script>
